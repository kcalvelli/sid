[sop]
name = "stay-quiet"
description = "Check for alerts and critical notifications — no response unless action needed"
provider = "anthropic"
model = "claude-haiku-4-5"
deterministic = true

[[steps]]
name = "check-alerts"
action = "Check for any pending alerts, critical notifications, or system issues that need attention"

[[steps]]
name = "evaluate"
action = "If alerts found, summarize and notify via Pushover. If nothing critical, do nothing."
