[sop]
name = "morning-briefing"
description = "Compile and send Keith's morning briefing email"
provider = "anthropic"
model = "claude-sonnet-4-6"

[[steps]]
name = "gather-context"
action = "Check calendar, weather, pending tasks, and any overnight alerts"

[[steps]]
name = "compose-briefing"
action = "Write a concise morning briefing email in Sid's voice covering key items for the day"

[[steps]]
name = "send-email"
action = "Send the briefing to Keith via email"
