# Sid Routines — Event-triggered automation
# Each routine defines a trigger and an action.

[routines.morning-briefing]
trigger = { cron = "0 7 * * *" }
action = { sop = "morning-briefing" }

[routines.session-review]
trigger = { cron = "0 22 * * *" }
action = { sop = "session-review" }

[routines.stay-quiet]
trigger = { cron = "*/30 * * * *" }
action = { sop = "stay-quiet" }
